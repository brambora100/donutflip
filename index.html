<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimo provoz | DonutFlip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #4cf09a;
            --bg: #060c15;
            --panel: #0d131c;
            --border: #1e2632;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: var(--panel);
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .donut {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #8492a6;
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(76, 240, 154, 0.1);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="donut">🍩</div>
        <h1>Pracujeme na tom!</h1>
        <p>Omlouváme se, ale DonutFlip je momentálně v údržbě. Stránka se odkládá kvůli vylepšením, ale nebojte – <strong>co nejdříve ji vrátíme zpátky</strong> v plné parádě.</p>
        
        <div class="status-badge">
            <div class="dot"></div>
            Probíhá údržba systému
        </div>
    </div>

</body>
</html>
